<script>
  console.log('Script_Loaded');

  const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSekABEyC7FXR8sou7A4tp7NS277BKXXvka3XCyPnIRdjPB71A/viewform?usp=publish-editor";
  const SHEET_CSV_BASE_URL = "https://docs.google.com/spreadsheets/d/1pWh5TiBTewNJNLAG37AniahnIQEixNadx4pnkVY7r9w/export?format=csv&gid=0";
  let DYNAMIC_HOTEL_DB = { '수': [], '금': [], '화': [], '목': [], '토': [] };

  function getSheetUrlWithCacheBuster() {
    return `${SHEET_CSV_BASE_URL}&t=${Date.now()}`;
  }

  function showFetchErrorBanner(message) {
    const banner = document.getElementById('errorBanner');
    banner.style.display = 'block';
    banner.textContent = '시트 연동 실패: ' + message + ' (백업 데이터로 대체됨)';
  }

  function parseCSVLine(text) {
    let p = '', r = [];
    let q = false;
    for (let i = 0; i < text.length; i++) {
      let c = text[i];
      if (c === '"') { q = !q; }
      else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
      else { p += c; }
    }
    r.push(p.trim());
    return r;
  }

  function normalizeOhaeng(raw) {
    if (!raw) return null;
    const match = raw.match(/[목화토금수]/);
    return match ? match[0] : null;
  }

  async function loadHotelDataFromSheet() {
    try {
      const response = await fetch(getSheetUrlWithCacheBuster());
      if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);

      const csvText = await response.text();
      const rows = csvText.split(/\r?\n/);

      const freshDB = { '수': [], '금': [], '화': [], '목': [], '토': [] };

      for (let i = 1; i < rows.length; i++) {
        if (!rows[i].trim()) continue;

        const columns = parseCSVLine(rows[i]);

        const country = columns[0] && columns[0].trim();
        const ohaeng = normalizeOhaeng(columns[1]);
        const name = (columns[2] && columns[2].trim()) || (columns[3] && columns[3].trim());
        const affUrl = columns[4] && columns[4].trim();
        const imgUrl = columns[5] && columns[5].trim();
        const feature = columns[8] && columns[8].trim();

        if (ohaeng && name && freshDB[ohaeng] !== undefined) {
          freshDB[ohaeng].push({
            name: name,
            imageUrl: imgUrl || 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=600&q=80',
            affiliateUrl: affUrl || 'https://example.com',
            isKorea: country === '한국',
            feature: feature || ''
          });
        }
      }

      const hasAnyData = Object.values(freshDB).some(arr => arr.length > 0);
      if (!hasAnyData) throw new Error("시트에서 유효한 행을 찾지 못함");

      DYNAMIC_HOTEL_DB = freshDB;
      console.log("구글 시트 국적별 분류 매핑 성공:", DYNAMIC_HOTEL_DB);
    } catch (err) {
      console.error("시트 페치 차단 -> 안전 대체 데이터 작동:", err);
      showFetchErrorBanner(err.message || String(err));
      useFallbackData();
    }
  }

  function useFallbackData() {
    const types = ['목', '화', '토', '금', '수'];
    types.forEach(t => {
      if (!DYNAMIC_HOTEL_DB[t] || DYNAMIC_HOTEL_DB[t].length === 0) {
        DYNAMIC_HOTEL_DB[t] = [
          { name: `파크로쉬 웰니스 마스터 (한국)`, imageUrl: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=600&q=80', affiliateUrl: 'https://example.com', isKorea: true, feature: '' },

  function hashStringToIndex(str, mod) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = (hash * 31 + str.charCodeAt(i)) % 1000003;
    }
    return Math.abs(hash) % mod;
  }

    const hanja = ELEMENT_INFO[needed].hanja;
    const variantIdx = hashStringToIndex(hotel.name, 3);

    const intro = ELEMENT_INTRO_VARIANTS[needed](hotel.name, hanja)[variantIdx];
    const closing = ELEMENT_CLOSING_VARIANTS[needed](needed)[variantIdx];
    const feature = (hotel.feature && hotel.feature.trim()) || ELEMENT_FEATURE_FALLBACK[needed];

    return `${intro} 이곳만의 포인트는 “${feature}”예요. ${closing}`;
  }

  const BADGE_POOL = ['재물운 명당', '연애운 핵심스팟', '대박 귀인 스팟', '번아웃 처방 스팟', '문서운 버프존', '명예운 상승 명당'];
  const BADGE_BUFF_MAP = {
    '재물운 명당': '💰 막혔던 현금 흐름의 대반전',
    '연애운 핵심스팟': '💘 얼어붙은 연애 세포의 대부활',
    '대박 귀인 스팟': '🍀 인생을 바꿀 결정적 귀인 등장',
    '번아웃 처방 스팟': '🌿 방전된 멘탈의 완전 충전',
    '문서운 버프존': '📜 막혔던 계약·시험운 활짝 개통',
    '명예운 상승 명당': '🎯 평판과 명예가 솟구치는 터닝포인트'
  };

  function pickRandomBadges() {
    return shuffleArray(BADGE_POOL).slice(0, 2);
  }

  function buildShareMessage(needed, hotel) {
    const spaceByElement = {
      '목': '숲속 힐링 숙소',
      '화': '루프탑 야경 숙소',
      '토': '산속 온천 숙소',
      '금': '대리석 스파 숙소',
      '수': '오션뷰 풀빌라'
    };
    const space = spaceByElement[needed] || '럭키 숙소';
    return `나 올해 사주에 ${needed}(${ELEMENT_INFO[needed].hanja}) 기운이 없어서 맨날 흔들렸나 봐 ㅠ 너도 이 기운 부족할지 몰라! 나랑 ${space} 가볼래?`;
  }

  function analyzeSaju(year, month, day) {
    const seed = year + month * 7 + day * 13;
    const ownedCount = 3;
    const startIdx = seed % 5;
    const owned = [];
    for (let i = 0; i < ownedCount; i++) owned.push(ELEMENTS[(startIdx + i) % 5]);
    const needed = ELEMENTS[(startIdx + ownedCount) % 5];
    return { owned, needed, seed };
  }

  function calculateMatchScore(seed) {
    return 70 + (Math.abs(seed) % 26);
  }

  function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function pickDiverseByFeature(candidates, count, alreadyPicked) {
    const usedFeatures = new Set(
      alreadyPicked.map(h => h.feature && h.feature.trim()).filter(Boolean)
    );
    const shuffled = shuffleArray(candidates);
    const result = [];

    shuffled.forEach(h => {
      if (result.length >= count) return;
      const feature = h.feature && h.feature.trim();
      if (!feature || !usedFeatures.has(feature)) {
        result.push(h);
        if (feature) usedFeatures.add(feature);
      }
    });

    if (result.length < count) {
      shuffled.forEach(h => {
        if (result.length >= count) return;
        if (!result.includes(h)) result.push(h);
      });
    }

    return result;
  }

  function getConditionalRandomHotels(neededElement) {
    let pool = DYNAMIC_HOTEL_DB[neededElement] || [];

    if (pool.length === 0) {
      useFallbackData();
      pool = DYNAMIC_HOTEL_DB[neededElement] || [];
    }

    const koreaHotels = pool.filter(h => h.isKorea === true);
    let result = [];

    if (koreaHotels.length > 0) {
      const shuffledKorea = shuffleArray(koreaHotels);
      result.push(shuffledKorea[0]);
    }

    const remainingPool = pool.filter(h => !result.includes(h));
    const picked = pickDiverseByFeature(remainingPool, 3 - result.length, result);
    result = result.concat(picked);

    return shuffleArray(result);
  }

  const RADAR_CENTER = 110;
  const RADAR_MAX_R = 70;
  const RADAR_BADGE_R = 100;
  const RADAR_VIEWBOX = 220;
  const RADAR_ANGLES = { '목': -90, '화': -18, '토': 54, '금': 126, '수': 198 };

  function radarPolar(angleDeg, r) {
    const rad = (angleDeg * Math.PI) / 180;
    return { x: RADAR_CENTER + r * Math.cos(rad), y: RADAR_CENTER + r * Math.sin(rad) };
  }

  function radarPointsForFraction(frac) {
    return ELEMENTS.map(el => {
      const p = radarPolar(RADAR_ANGLES[el], RADAR_MAX_R * frac);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');
  }

  function initRadarChart() {
    document.getElementById('radarGrid1').setAttribute('points', radarPointsForFraction(1));
    document.getElementById('radarGrid2').setAttribute('points', radarPointsForFraction(0.66));
    document.getElementById('radarGrid3').setAttribute('points', radarPointsForFraction(0.33));

    ELEMENTS.forEach(el => {
      const p = radarPolar(RADAR_ANGLES[el], RADAR_BADGE_R);
      const badgeEl = document.getElementById(`badge-${el}`);
      badgeEl.style.left = `${(p.x / RADAR_VIEWBOX) * 100}%`;
      badgeEl.style.top = `${(p.y / RADAR_VIEWBOX) * 100}%`;
    });
  }
  initRadarChart();

  function renderRadarValues(owned, needed) {
    const valueFraction = {};
    ELEMENTS.forEach(el => {
      if (el === needed) valueFraction[el] = 0.28;
      else if (owned.includes(el)) valueFraction[el] = 0.92;
      else valueFraction[el] = 0.58;
    });

    const valuePoints = ELEMENTS.map(el => {
      const p = radarPolar(RADAR_ANGLES[el], RADAR_MAX_R * valueFraction[el]);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');
    document.getElementById('radarValue').setAttribute('points', valuePoints);

    ELEMENTS.forEach(el => {
      const isNeeded = el === needed;
      const isOwned = owned.includes(el);
      const p = radarPolar(RADAR_ANGLES[el], RADAR_MAX_R * valueFraction[el]);
      const dot = document.getElementById(`dot-${el}`);
      dot.setAttribute('cx', p.x.toFixed(1));
      dot.setAttribute('cy', p.y.toFixed(1));

      const badgeEl = document.getElementById(`badge-${el}`);
      badgeEl.classList.remove('strong', 'neutral', 'weak');
      if (isNeeded) {
        badgeEl.classList.add('weak');
        badgeEl.innerHTML = `⚠️ ${el} [기운 부족]`;
      } else if (isOwned) {
        badgeEl.classList.add('strong');
        badgeEl.innerHTML = `${ELEMENT_INFO[el].emoji} ${el} [${ELEMENT_STRONG_LABEL[el]}]`;
      } else {
        badgeEl.classList.add('neutral');
        badgeEl.innerHTML = `${el} [균형]`;
      }
    });
  }

  let currentResultContext = { needed: '화', topHotel: null };

  function renderResult(year, month, day) {
    const { owned, needed, seed } = analyzeSaju(year, month, day);

    document.body.style.background = BACKGROUND_THEMES[needed];

    renderRadarValues(owned, needed);

    const score = calculateMatchScore(seed);
    document.getElementById('radarScoreNum').textContent = `${score}`;

    const details = ELEMENT_DETAILS[needed];
    document.getElementById('symptomTitle').textContent = `⚠️ 올해 운기와 내 '${needed}(${ELEMENT_INFO[needed].hanja})' 부족 오행이 부딪힐 때 증상`;
    document.getElementById('symptomText').textContent = details.symptom;
    document.getElementById('solutionTitle').textContent = `🎯 오행의 균형을 되찾을 '${needed}(${ELEMENT_INFO[needed].hanja})' 기운 보완 가이드`;
    document.getElementById('solutionText').textContent = details.solution;

    const hotelListEl = document.getElementById('hotelList');
    const finalDisplayHotels = getConditionalRandomHotels(needed);
    const channelParam = detectChannel();

    hotelListEl.innerHTML = finalDisplayHotels.map((h, idx) => {
      const separator = h.affiliateUrl.includes('?') ? '&' : '?';
      const finalTrackingUrl = `${h.affiliateUrl}${separator}pid=${channelParam}`;
      const reasonHtml = buildPersonalizedReason(needed, h);
      const badges = pickRandomBadges();
      const buffText = BADGE_BUFF_MAP[badges[0]];

      return `
        <div class="hotel-card" data-idx="${idx}" data-affiliate-url="${finalTrackingUrl}">
          <img class="hotel-thumb" src="${h.imageUrl}" alt="${h.name}" onerror="this.src='https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=600&q=80'" loading="lazy">
          <div class="p-4">
            <p class="text-[14px] font-bold text-white leading-snug mb-1.5">${h.name}</p>
            <div class="flex flex-wrap gap-1.5 mb-2.5">
              ${badges.map(tag => `<span class="hotel-tag">${tag}</span>`).join('')}
            </div>
            <p class="text-xs text-amber-100/75 leading-relaxed mb-3 bg-black/25 p-2.5 rounded-xl border border-white/5">
              💡 <strong class="text-amber-200">추천 이유:</strong> ${reasonHtml}
            </p>
            <div class="flex items-center justify-between border-t border-white/10 pt-2.5 mt-2">
              <span class="text-[12px] font-bold text-emerald-300">${buffText}</span>
              <button type="button" class="hotel-cta-btn hotel-go-btn" data-affiliate-url="${finalTrackingUrl}">호텔에서 기운 받기</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    currentResultContext = { needed, topHotel: finalDisplayHotels[0] || null };
    return { owned, needed };
  }

  function openExternalLink(url) {
    const newWin = window.open(url, '_blank', 'noopener,noreferrer');
    if (!newWin) window.location.href = url;
  }

  document.getElementById('hotelList').addEventListener('click', (e) => {
    const goBtn = e.target.closest('.hotel-go-btn');
    const card = e.target.closest('.hotel-card');
    if (!card) return;

    const url = (goBtn || card).dataset.affiliateUrl;
    console.log('Hotel_Banner_Clicked', { url });
    openExternalLink(url);
  });

  function showScreen(el) {
    el.classList.remove('hidden-screen');
    el.style.display = 'flex';
    el.classList.add('fade-in');
  }
  function hideScreen(el) {
    el.classList.add('hidden-screen');
    el.style.display = 'none';
    el.classList.remove('fade-out', 'fade-in');
  }
  function switchScreen(fromEl, toEl) {
    fromEl.classList.add('fade-out');
    setTimeout(() => {
      hideScreen(fromEl);
      showScreen(toEl);
      try { window.scrollTo(0, 0); } catch (e) {}
    }, 500);
  }

  const mainScreen = document.getElementById('mainScreen');
  const loadingScreen = document.getElementById('loadingScreen');
  const resultScreen = document.getElementById('resultScreen');
  const loadingText = document.getElementById('loadingText');
  const progressBar = document.getElementById('progressBar');
  const mainBtn = document.getElementById('mainBtn');
  const kakaoShareBtn = document.getElementById('kakaoShareBtn');
  const leadFormBtn = document.getElementById('leadFormBtn');

  mainBtn.addEventListener('click', () => {
    console.log('Main_Button_Clicked');
    const year = parseInt(yearSelect.value, 10);
    const month = parseInt(monthSelect.value, 10);
    const day = parseInt(daySelect.value, 10);

    mainScreen.classList.add('fade-out');
    setTimeout(() => {
      hideScreen(mainScreen);
      showScreen(loadingScreen);

      requestAnimationFrame(() => { progressBar.style.width = '100%'; });

      setTimeout(() => {
        loadingText.style.opacity = 0;
        setTimeout(() => {
          loadingText.textContent = '나에게 필요한 오행 기운 계산 중...';
          loadingText.style.opacity = 1;
        }, 200);
      }, 700);

      setTimeout(() => {
        console.log('Loading_Finished');
        const { needed } = renderResult(year, month, day);
        console.log('Result_Rendered', { needed });
        switchScreen(loadingScreen, resultScreen);
      }, 1500);
    }, 500);
  });

  kakaoShareBtn.addEventListener('click', async () => {
    console.log('Kakao_Share_Button_Clicked', currentResultContext);
    const { needed, topHotel } = currentResultContext;
    const message = buildShareMessage(needed, topHotel);
    const shareUrl = (topHotel && topHotel.affiliateUrl) || window.location.href;

    if (navigator.share) {
      try {
        await navigator.share({ text: message, url: shareUrl });
        return;
      } catch (err) {
        console.log('Share_Cancelled_Or_Failed', err);
        return;
      }
    }

    try {
      await navigator.clipboard.writeText(`${message} ${shareUrl}`);
      showToast('공유 메시지가 복사됐어요! 카카오톡에 붙여넣어 보내보세요.');
    } catch (err) {
      showToast('공유 메시지를 복사하지 못했어요. 직접 캡처해서 공유해 주세요!');
    }
  });

  leadFormBtn.addEventListener('click', () => {
    console.log('Lead_Form_Button_Clicked');
    openExternalLink(GOOGLE_FORM_URL);
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    console.log('Retry_Button_Clicked');
    document.body.style.background = 'radial-gradient(circle at 50% 0%, #2a1f5c 0%, #160f33 45%, #0a0620 100%)';
    progressBar.style.width = '0%';
    loadingText.textContent = '사주 원국 분석 중...';
    switchScreen(resultScreen, mainScreen);
    loadHotelDataFromSheet();
  });
</script>
